<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏠 Explorador de Propiedades — Valladolid &amp; Madrid</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
:root {
  --navy: #1a2332;
  --navy-light: #2d3748;
  --blue: #3b82f6;
  --green: #16a34a;
  --red: #dc2626;
  --amber: #d97706;
  --purple: #7c3aed;
  --gray-50: #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-300: #d1d5db;
  --gray-400: #9ca3af;
  --gray-500: #6b7280;
  --gray-600: #4b5563;
  --gray-700: #374151;
  --gray-800: #1f2937;
  --shadow: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 6px rgba(0,0,0,0.07), 0 2px 4px rgba(0,0,0,0.06);
  --shadow-lg: 0 10px 15px rgba(0,0,0,0.1), 0 4px 6px rgba(0,0,0,0.05);
  --radius: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--gray-50); color: var(--gray-800); }

/* HEADER */
.header { background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%); color: white; padding: 24px 32px; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-lg); }
.header h1 { font-size: 1.5rem; font-weight: 700; }
.header .subtitle { color: #94a3b8; margin-top: 4px; font-size: 0.95rem; }
.header-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.search-box { padding: 10px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; font-size: 0.95rem; width: 320px; max-width: 100%; outline: none; }
.search-box::placeholder { color: rgba(255,255,255,0.5); }
.search-box:focus { border-color: var(--blue); background: rgba(255,255,255,0.15); }

/* LAYOUT */
.layout { display: flex; min-height: calc(100vh - 80px); }

/* SIDEBAR */
.sidebar { width: 300px; min-width: 300px; background: white; border-right: 1px solid var(--gray-200); padding: 20px; overflow-y: auto; max-height: calc(100vh - 80px); position: sticky; top: 80px; }
.sidebar h3 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--gray-400); margin: 16px 0 8px; }
.sidebar h3:first-child { margin-top: 0; }
.filter-group { margin-bottom: 12px; }
.filter-group label { display: block; font-size: 0.85rem; color: var(--gray-600); margin-bottom: 4px; font-weight: 500; }
.filter-group select, .filter-group input[type="number"] {
  width: 100%; padding: 8px 10px; border: 1px solid var(--gray-200); border-radius: 6px;
  font-size: 0.9rem; background: white; color: var(--gray-700); outline: none;
}
.filter-group select:focus, .filter-group input:focus { border-color: var(--blue); }
.range-row { display: flex; gap: 8px; align-items: center; }
.range-row input { width: 50%; }
.range-row span { color: var(--gray-400); font-size: 0.85rem; }
.checkbox-list { max-height: 160px; overflow-y: auto; border: 1px solid var(--gray-200); border-radius: 6px; padding: 6px; }
.checkbox-list label { display: flex; align-items: center; gap: 6px; padding: 3px 4px; font-size: 0.85rem; cursor: pointer; border-radius: 4px; color: var(--gray-700); }
.checkbox-list label:hover { background: var(--gray-50); }
.checkbox-list input[type="checkbox"] { accent-color: var(--blue); }
.tri-toggle { display: flex; gap: 0; border: 1px solid var(--gray-200); border-radius: 6px; overflow: hidden; }
.tri-toggle button { flex: 1; padding: 6px; font-size: 0.8rem; border: none; background: white; cursor: pointer; color: var(--gray-600); transition: all 0.15s; }
.tri-toggle button.active { background: var(--blue); color: white; }
.tri-toggle button:not(:last-child) { border-right: 1px solid var(--gray-200); }
.btn-clear { width: 100%; padding: 10px; border: 1px solid var(--red); background: white; color: var(--red); border-radius: 8px; font-size: 0.9rem; cursor: pointer; margin-top: 16px; font-weight: 500; transition: all 0.15s; }
.btn-clear:hover { background: var(--red); color: white; }

/* MAIN */
.main { flex: 1; padding: 20px; min-width: 0; }

/* STATS */
.stats-bar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
.stat-card { background: white; border-radius: var(--radius); padding: 14px 18px; box-shadow: var(--shadow); flex: 1; min-width: 140px; }
.stat-card .stat-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--gray-400); }
.stat-card .stat-value { font-size: 1.25rem; font-weight: 700; color: var(--gray-800); margin-top: 2px; }

/* SORT BAR */
.sort-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.sort-bar select { padding: 8px 12px; border: 1px solid var(--gray-200); border-radius: 6px; font-size: 0.9rem; background: white; }
.sort-bar button { padding: 8px 12px; border: 1px solid var(--gray-200); border-radius: 6px; background: white; cursor: pointer; font-size: 0.9rem; }
.sort-bar button:hover { background: var(--gray-50); }
.view-toggle { margin-left: auto; display: flex; gap: 0; }
.view-toggle button { padding: 8px 12px; border: 1px solid var(--gray-200); background: white; cursor: pointer; font-size: 1rem; }
.view-toggle button:first-child { border-radius: 6px 0 0 6px; }
.view-toggle button:last-child { border-radius: 0 6px 6px 0; border-left: none; }
.view-toggle button.active { background: var(--navy); color: white; border-color: var(--navy); }

/* GRID */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
.grid.list-view { grid-template-columns: 1fr; }

/* CARD */
.card { background: white; border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; transition: box-shadow 0.2s, transform 0.2s; display: flex; flex-direction: column; }
.card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
.list-view .card { flex-direction: row; }
.card-top { padding: 16px 16px 0; display: flex; justify-content: space-between; align-items: flex-start; }
.badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
.badge-zona { background: #e0e7ff; color: #3730a3; }
.badge-estado { font-size: 0.7rem; }
.badge-bueno { background: #dcfce7; color: #166534; }
.badge-reformar { background: #fee2e2; color: #991b1b; }
.badge-reformado { background: #dbeafe; color: #1e40af; }
.badge-nuevo { background: #fef3c7; color: #92400e; }
.badge-default { background: var(--gray-100); color: var(--gray-600); }
.card-body { padding: 12px 16px; flex: 1; }
.card-price { font-size: 1.4rem; font-weight: 800; color: var(--gray-800); }
.card-ppm2 { font-size: 0.85rem; color: var(--gray-500); margin-top: 2px; }
.card-features { display: flex; gap: 14px; margin-top: 10px; color: var(--gray-600); font-size: 0.9rem; }
.card-features span { display: flex; align-items: center; gap: 4px; }
.card-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; }
.card-badges .mini-badge { padding: 2px 7px; border-radius: 4px; font-size: 0.72rem; background: var(--gray-100); color: var(--gray-600); }
.card-badges .mini-badge.yes { background: #dbeafe; color: #1e40af; }
.card-address { margin-top: 10px; font-size: 0.85rem; color: var(--gray-500); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-travel { display: flex; gap: 12px; margin-top: 8px; font-size: 0.82rem; color: var(--gray-500); }
.card-footer { padding: 12px 16px; border-top: 1px solid var(--gray-100); display: flex; gap: 8px; align-items: center; }
.btn-idealista { flex: 1; padding: 8px; border: none; background: var(--blue); color: white; border-radius: 6px; font-size: 0.85rem; font-weight: 600; cursor: pointer; text-decoration: none; text-align: center; transition: background 0.15s; }
.btn-idealista:hover { background: #2563eb; }
.btn-expand { padding: 8px 12px; border: 1px solid var(--gray-200); background: white; border-radius: 6px; font-size: 0.85rem; cursor: pointer; color: var(--gray-500); }
.btn-expand:hover { background: var(--gray-50); }
.card-desc { padding: 0 16px 12px; font-size: 0.85rem; color: var(--gray-600); line-height: 1.6; display: none; max-height: 200px; overflow-y: auto; }
.card-desc.open { display: block; animation: fadeIn 0.2s; }

/* LOADING */
.loading { text-align: center; padding: 60px; color: var(--gray-400); font-size: 1.1rem; }
.loading .spinner { width: 40px; height: 40px; border: 3px solid var(--gray-200); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* MOBILE TOGGLE */
.sidebar-toggle { display: none; position: fixed; bottom: 20px; left: 20px; z-index: 200; padding: 14px 18px; background: var(--navy); color: white; border: none; border-radius: 50px; font-size: 0.9rem; font-weight: 600; cursor: pointer; box-shadow: var(--shadow-lg); }

/* NO RESULTS */
.no-results { text-align: center; padding: 60px 20px; color: var(--gray-400); }
.no-results h3 { font-size: 1.2rem; margin-bottom: 8px; color: var(--gray-500); }

/* PAGINATION */
.load-more { text-align: center; margin-top: 20px; }
.load-more button { padding: 12px 32px; background: white; border: 1px solid var(--gray-200); border-radius: 8px; font-size: 0.95rem; cursor: pointer; color: var(--gray-600); }
.load-more button:hover { background: var(--gray-50); border-color: var(--gray-300); }

@media (max-width: 768px) {
  .sidebar { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 150; max-height: 100vh; top: 0; padding-top: 60px; }
  .sidebar.open { display: block; }
  .sidebar-toggle { display: block; }
  .grid { grid-template-columns: 1fr; }
  .header { padding: 16px; }
  .search-box { width: 100%; }
  .stat-card { min-width: 100px; }
  .stat-card .stat-value { font-size: 1rem; }
  .sidebar-close { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--gray-500); }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div>
      <h1>🏠 Explorador de Propiedades</h1>
      <div class="subtitle" id="subtitle">Cargando datos...</div>
    </div>
    <input type="text" class="search-box" id="searchBox" placeholder="🔍 Buscar por dirección o descripción...">
  </div>
</div>

<button class="sidebar-toggle" id="sidebarToggle">⚙️ Filtros</button>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <button class="sidebar-close" id="sidebarClose" style="display:none;">✕</button>
    
    <h3>📍 Ubicación</h3>
    <div class="filter-group">
      <label>Zona</label>
      <div class="checkbox-list" id="filterZona"></div>
    </div>
    <div class="filter-group">
      <label>Subzona</label>
      <div class="checkbox-list" id="filterSubzona"></div>
    </div>

    <h3>💰 Precio</h3>
    <div class="filter-group">
      <label>Precio (€)</label>
      <div class="range-row">
        <input type="number" id="precioMin" placeholder="Min" step="5000">
        <span>—</span>
        <input type="number" id="precioMax" placeholder="Max" step="5000">
      </div>
    </div>
    <div class="filter-group">
      <label>Precio/m² (€)</label>
      <div class="range-row">
        <input type="number" id="ppm2Min" placeholder="Min" step="50">
        <span>—</span>
        <input type="number" id="ppm2Max" placeholder="Max" step="50">
      </div>
    </div>

    <h3>📐 Tamaño</h3>
    <div class="filter-group">
      <label>m² construidos</label>
      <div class="range-row">
        <input type="number" id="m2Min" placeholder="Min" step="5">
        <span>—</span>
        <input type="number" id="m2Max" placeholder="Max" step="5">
      </div>
    </div>
    <div class="filter-group">
      <label>Habitaciones (mín.)</label>
      <select id="filterHab">
        <option value="0">Todas</option>
        <option value="1">1+</option>
        <option value="2">2+</option>
        <option value="3">3+</option>
        <option value="4">4+</option>
        <option value="5">5+</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Baños (mín.)</label>
      <select id="filterBan">
        <option value="0">Todos</option>
        <option value="1">1+</option>
        <option value="2">2+</option>
        <option value="3">3+</option>
      </select>
    </div>

    <h3>🏗️ Características</h3>
    <div class="filter-group">
      <label>Ascensor</label>
      <div class="tri-toggle" data-filter="ascensor">
        <button class="active" data-val="">Todos</button>
        <button data-val="Sí">Sí</button>
        <button data-val="No">No</button>
      </div>
    </div>
    <div class="filter-group">
      <label>Exterior / Interior</label>
      <div class="tri-toggle" data-filter="exterior">
        <button class="active" data-val="">Todos</button>
        <button data-val="Exterior">Ext</button>
        <button data-val="Interior">Int</button>
      </div>
    </div>
    <div class="filter-group">
      <label>Garaje</label>
      <div class="tri-toggle" data-filter="garaje">
        <button class="active" data-val="">Todos</button>
        <button data-val="Sí">Sí</button>
        <button data-val="No">No</button>
      </div>
    </div>
    <div class="filter-group">
      <label>Terraza</label>
      <div class="tri-toggle" data-filter="terraza">
        <button class="active" data-val="">Todos</button>
        <button data-val="Sí">Sí</button>
        <button data-val="No">No</button>
      </div>
    </div>
    <div class="filter-group">
      <label>Piscina</label>
      <div class="tri-toggle" data-filter="piscina">
        <button class="active" data-val="">Todos</button>
        <button data-val="Sí">Sí</button>
        <button data-val="No">No</button>
      </div>
    </div>
    <div class="filter-group">
      <label>Estado</label>
      <div class="checkbox-list" id="filterEstado"></div>
    </div>
    
    <h3>📅 Año</h3>
    <div class="filter-group">
      <label>Año construcción</label>
      <div class="range-row">
        <input type="number" id="yearMin" placeholder="Min">
        <span>—</span>
        <input type="number" id="yearMax" placeholder="Max">
      </div>
    </div>

    <button class="btn-clear" id="btnClear">🗑️ Limpiar todos los filtros</button>
  </aside>

  <main class="main">
    <div class="stats-bar" id="statsBar">
      <div class="stat-card"><div class="stat-label">Propiedades</div><div class="stat-value" id="statCount">—</div></div>
      <div class="stat-card"><div class="stat-label">Precio medio</div><div class="stat-value" id="statAvgPrice">—</div></div>
      <div class="stat-card"><div class="stat-label">€/m² medio</div><div class="stat-value" id="statAvgPpm2">—</div></div>
      <div class="stat-card"><div class="stat-label">m² medio</div><div class="stat-value" id="statAvgM2">—</div></div>
      <div class="stat-card"><div class="stat-label">Rango precio</div><div class="stat-value" id="statRange">—</div></div>
    </div>

    <div class="sort-bar">
      <label style="font-size:0.85rem; color:var(--gray-500);">Ordenar por:</label>
      <select id="sortBy">
        <option value="precio">Precio</option>
        <option value="ppm2">Precio/m²</option>
        <option value="m2">m² construidos</option>
        <option value="hab">Habitaciones</option>
        <option value="year">Año construcción</option>
      </select>
      <button id="sortDir" title="Cambiar orden">↑ Ascendente</button>
      <div class="view-toggle">
        <button id="viewGrid" class="active" title="Vista cuadrícula">⊞</button>
        <button id="viewList" title="Vista lista">☰</button>
      </div>
    </div>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      Cargando propiedades...
    </div>

    <div class="grid" id="grid"></div>
    
    <div class="no-results" id="noResults" style="display:none;">
      <h3>😕 Sin resultados</h3>
      <p>Prueba a cambiar los filtros</p>
    </div>

    <div class="load-more" id="loadMore" style="display:none;">
      <button id="btnLoadMore">Cargar más propiedades</button>
    </div>
  </main>
</div>

<script>
const BATCH_SIZE = 60;
let allData = [];
let filtered = [];
let rendered = 0;
let sortAsc = true;
let triFilters = { ascensor: '', exterior: '', garaje: '', terraza: '', piscina: '' };

// Format number with dots
function fmt(n) { return n != null ? Math.round(n).toLocaleString('es-ES') : '—'; }

// Parse number from CSV
function pn(v) { const n = parseFloat(String(v).replace(/[^\d.-]/g, '')); return isNaN(n) ? null : n; }

// Estado badge class
function estadoClass(e) {
  if (!e) return 'badge-default';
  const l = e.toLowerCase();
  if (l.includes('reformar')) return 'badge-reformar';
  if (l.includes('reformado')) return 'badge-bueno';
  if (l.includes('buen estado')) return 'badge-bueno';
  if (l.includes('obra nueva') || l.includes('nueva')) return 'badge-nuevo';
  return 'badge-default';
}

function estadoShort(e) {
  if (!e) return '';
  if (e.includes('/')) return e.split('/').pop().trim();
  return e;
}

// Build card HTML
function cardHTML(d) {
  const price = pn(d['Precio (€)']);
  const m2 = pn(d['m² construidos']);
  const ppm2 = (price && m2 && m2 > 0) ? Math.round(price / m2) : null;
  const hab = d['Habitaciones'] || '—';
  const ban = d['Baños'] || '—';
  const link = d['Link'] || '#';
  const addr = d['Dirección'] || '';
  const zona = d['Zona'] || '';
  const sub = d['Subzona'] || '';
  const estado = d['Estado'] || '';
  const desc = (d['Descripción'] || '').substring(0, 600);
  const coche = d['Coche lunes 8am (min)'];
  const bus = d['Bus lunes 8am (min)'];
  const pie = d['A pie (min)'];
  
  const badges = [];
  if (d['Ascensor'] === 'Sí') badges.push('<span class="mini-badge yes">Ascensor</span>');
  if (d['Garaje'] === 'Sí' || (d['Garaje'] && d['Garaje'] !== 'No' && d['Garaje'] !== '')) badges.push('<span class="mini-badge yes">Garaje</span>');
  if (d['Terraza'] === 'Sí') badges.push('<span class="mini-badge yes">Terraza</span>');
  if (d['Exterior/Interior'] === 'Exterior') badges.push('<span class="mini-badge yes">Exterior</span>');
  if (d['Piscina'] === 'Sí') badges.push('<span class="mini-badge yes">Piscina</span>');
  if (d['Jardín'] === 'Sí') badges.push('<span class="mini-badge yes">Jardín</span>');
  if (d['Trastero'] === 'Sí') badges.push('<span class="mini-badge yes">Trastero</span>');
  if (d['Aire acondicionado'] === 'Sí') badges.push('<span class="mini-badge">A/C</span>');

  const travel = [];
  if (coche) travel.push(`🚗 ${coche} min`);
  if (bus) travel.push(`🚌 ${bus} min`);
  if (pie) travel.push(`🚶 ${pie} min`);

  return `<div class="card">
    <div class="card-top">
      <span class="badge badge-zona">${zona}${sub ? ' › ' + sub : ''}</span>
      ${estado ? `<span class="badge badge-estado ${estadoClass(estado)}">${estadoShort(estado)}</span>` : ''}
    </div>
    <div class="card-body">
      <div class="card-price">${price ? fmt(price) + ' €' : 'Consultar'}</div>
      <div class="card-ppm2">${ppm2 ? fmt(ppm2) + ' €/m²' : ''} ${m2 ? '· ' + fmt(m2) + ' m²' : ''}</div>
      <div class="card-features">
        <span>🛏️ ${hab}</span>
        <span>🚿 ${ban}</span>
        ${d['Planta'] ? `<span>🏢 ${d['Planta']}</span>` : ''}
        ${d['Año construcción'] ? `<span>📅 ${d['Año construcción']}</span>` : ''}
      </div>
      ${badges.length ? `<div class="card-badges">${badges.join('')}</div>` : ''}
      <div class="card-address" title="${addr}">${addr}</div>
      ${travel.length ? `<div class="card-travel">${travel.join(' · ')}</div>` : ''}
    </div>
    <div class="card-desc">${desc}${desc.length >= 600 ? '...' : ''}</div>
    <div class="card-footer">
      <a href="${link}" target="_blank" rel="noopener" class="btn-idealista">Ver en idealista ↗</a>
      ${desc ? `<button class="btn-expand" onclick="this.closest('.card').querySelector('.card-desc').classList.toggle('open'); this.textContent = this.textContent === '▼' ? '▲' : '▼';">▼</button>` : ''}
    </div>
  </div>`;
}

// Render batch
function renderBatch() {
  const grid = document.getElementById('grid');
  const end = Math.min(rendered + BATCH_SIZE, filtered.length);
  let html = '';
  for (let i = rendered; i < end; i++) {
    html += cardHTML(filtered[i]);
  }
  grid.insertAdjacentHTML('beforeend', html);
  rendered = end;
  document.getElementById('loadMore').style.display = rendered < filtered.length ? '' : 'none';
  if (filtered.length > 0) {
    document.getElementById('btnLoadMore').textContent = `Cargar más (${rendered}/${filtered.length})`;
  }
}

// Update stats
function updateStats() {
  const n = filtered.length;
  document.getElementById('statCount').textContent = fmt(n);
  if (n === 0) {
    ['statAvgPrice','statAvgPpm2','statAvgM2','statRange'].forEach(id => document.getElementById(id).textContent = '—');
    return;
  }
  let sumP = 0, sumPPM2 = 0, sumM2 = 0, cP = 0, cPPM2 = 0, cM2 = 0, minP = Infinity, maxP = 0;
  filtered.forEach(d => {
    const p = pn(d['Precio (€)']);
    const m = pn(d['m² construidos']);
    if (p) { sumP += p; cP++; if (p < minP) minP = p; if (p > maxP) maxP = p; }
    if (m) { sumM2 += m; cM2++; }
    if (p && m && m > 0) { sumPPM2 += p/m; cPPM2++; }
  });
  document.getElementById('statAvgPrice').textContent = cP ? fmt(sumP/cP) + ' €' : '—';
  document.getElementById('statAvgPpm2').textContent = cPPM2 ? fmt(sumPPM2/cPPM2) + ' €' : '—';
  document.getElementById('statAvgM2').textContent = cM2 ? fmt(sumM2/cM2) + ' m²' : '—';
  document.getElementById('statRange').textContent = cP ? fmt(minP) + ' — ' + fmt(maxP) + ' €' : '—';
}

// Get checked values
function getChecked(containerId) {
  const checks = document.querySelectorAll(`#${containerId} input:checked`);
  return Array.from(checks).map(c => c.value);
}

// Apply filters
function applyFilters() {
  const search = document.getElementById('searchBox').value.toLowerCase().trim();
  const zonas = getChecked('filterZona');
  const subzonas = getChecked('filterSubzona');
  const estados = getChecked('filterEstado');
  const precioMin = pn(document.getElementById('precioMin').value);
  const precioMax = pn(document.getElementById('precioMax').value);
  const m2Min = pn(document.getElementById('m2Min').value);
  const m2Max = pn(document.getElementById('m2Max').value);
  const ppm2Min = pn(document.getElementById('ppm2Min').value);
  const ppm2Max = pn(document.getElementById('ppm2Max').value);
  const habMin = parseInt(document.getElementById('filterHab').value) || 0;
  const banMin = parseInt(document.getElementById('filterBan').value) || 0;
  const yearMin = pn(document.getElementById('yearMin').value);
  const yearMax = pn(document.getElementById('yearMax').value);

  filtered = allData.filter(d => {
    const p = pn(d['Precio (€)']);
    const m = pn(d['m² construidos']);
    const ppm2 = (p && m && m > 0) ? p/m : null;
    const h = pn(d['Habitaciones']);
    const b = pn(d['Baños']);
    const y = pn(d['Año construcción']);

    if (search) {
      const hay = ((d['Dirección']||'') + ' ' + (d['Descripción']||'')).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    if (zonas.length && !zonas.includes(d['Zona'])) return false;
    if (subzonas.length && !subzonas.includes(d['Subzona'])) return false;
    if (estados.length && !estados.includes(d['Estado']||'')) return false;
    if (precioMin != null && (p == null || p < precioMin)) return false;
    if (precioMax != null && (p == null || p > precioMax)) return false;
    if (m2Min != null && (m == null || m < m2Min)) return false;
    if (m2Max != null && (m == null || m > m2Max)) return false;
    if (ppm2Min != null && (ppm2 == null || ppm2 < ppm2Min)) return false;
    if (ppm2Max != null && (ppm2 == null || ppm2 > ppm2Max)) return false;
    if (habMin > 0 && (h == null || h < habMin)) return false;
    if (banMin > 0 && (b == null || b < banMin)) return false;
    if (yearMin != null && (y == null || y < yearMin)) return false;
    if (yearMax != null && (y == null || y > yearMax)) return false;

    // Tri-toggle filters
    if (triFilters.ascensor && d['Ascensor'] !== triFilters.ascensor) return false;
    if (triFilters.exterior && d['Exterior/Interior'] !== triFilters.exterior) return false;
    if (triFilters.garaje) {
      const g = d['Garaje'] || '';
      if (triFilters.garaje === 'Sí' && !(g === 'Sí' || (g && g !== 'No'))) return false;
      if (triFilters.garaje === 'No' && g && g !== 'No' && g !== '') return false;
    }
    if (triFilters.terraza && d['Terraza'] !== triFilters.terraza) return false;
    if (triFilters.piscina && d['Piscina'] !== triFilters.piscina) return false;

    return true;
  });

  // Sort
  sortFiltered();
  
  // Render
  document.getElementById('grid').innerHTML = '';
  rendered = 0;
  renderBatch();
  updateStats();
  document.getElementById('subtitle').textContent = `${fmt(filtered.length)} propiedades encontradas`;
  document.getElementById('noResults').style.display = filtered.length === 0 ? '' : 'none';
}

function sortFiltered() {
  const by = document.getElementById('sortBy').value;
  const dir = sortAsc ? 1 : -1;
  filtered.sort((a, b) => {
    let va, vb;
    if (by === 'precio') { va = pn(a['Precio (€)']); vb = pn(b['Precio (€)']); }
    else if (by === 'ppm2') {
      const pa = pn(a['Precio (€)']), ma = pn(a['m² construidos']);
      const pb = pn(b['Precio (€)']), mb = pn(b['m² construidos']);
      va = (pa && ma) ? pa/ma : null; vb = (pb && mb) ? pb/mb : null;
    }
    else if (by === 'm2') { va = pn(a['m² construidos']); vb = pn(b['m² construidos']); }
    else if (by === 'hab') { va = pn(a['Habitaciones']); vb = pn(b['Habitaciones']); }
    else if (by === 'year') { va = pn(a['Año construcción']); vb = pn(b['Año construcción']); }
    if (va == null && vb == null) return 0;
    if (va == null) return 1;
    if (vb == null) return -1;
    return (va - vb) * dir;
  });
}

// Populate checkbox list
function populateCheckboxes(containerId, values) {
  const el = document.getElementById(containerId);
  el.innerHTML = values.filter(v => v).sort().map(v => 
    `<label><input type="checkbox" value="${v}"> ${v}</label>`
  ).join('');
  el.querySelectorAll('input').forEach(cb => cb.addEventListener('change', applyFilters));
}

// Init
function init(data) {
  allData = data;
  document.getElementById('loading').style.display = 'none';

  // Populate filter options
  const zonas = [...new Set(data.map(d => d['Zona']))].filter(Boolean);
  const subzonas = [...new Set(data.map(d => d['Subzona']))].filter(Boolean);
  const estados = [...new Set(data.map(d => d['Estado']))];
  
  populateCheckboxes('filterZona', zonas);
  populateCheckboxes('filterSubzona', subzonas);
  populateCheckboxes('filterEstado', estados);

  // Update subzonas when zona changes
  document.getElementById('filterZona').addEventListener('change', () => {
    const selZonas = getChecked('filterZona');
    if (selZonas.length === 0) {
      populateCheckboxes('filterSubzona', subzonas);
    } else {
      const filteredSub = [...new Set(data.filter(d => selZonas.includes(d['Zona'])).map(d => d['Subzona']))];
      populateCheckboxes('filterSubzona', filteredSub);
    }
  });

  // Tri-toggle setup
  document.querySelectorAll('.tri-toggle').forEach(tog => {
    const filterName = tog.dataset.filter;
    tog.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        tog.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        triFilters[filterName] = btn.dataset.val;
        applyFilters();
      });
    });
  });

  // Input filters
  ['precioMin','precioMax','m2Min','m2Max','ppm2Min','ppm2Max','yearMin','yearMax'].forEach(id => {
    document.getElementById(id).addEventListener('input', debounce(applyFilters, 300));
  });
  ['filterHab','filterBan'].forEach(id => {
    document.getElementById(id).addEventListener('change', applyFilters);
  });
  document.getElementById('searchBox').addEventListener('input', debounce(applyFilters, 300));

  // Sort
  document.getElementById('sortBy').addEventListener('change', applyFilters);
  document.getElementById('sortDir').addEventListener('click', () => {
    sortAsc = !sortAsc;
    document.getElementById('sortDir').textContent = sortAsc ? '↑ Ascendente' : '↓ Descendente';
    applyFilters();
  });

  // View toggle
  document.getElementById('viewGrid').addEventListener('click', () => {
    document.getElementById('grid').classList.remove('list-view');
    document.getElementById('viewGrid').classList.add('active');
    document.getElementById('viewList').classList.remove('active');
  });
  document.getElementById('viewList').addEventListener('click', () => {
    document.getElementById('grid').classList.add('list-view');
    document.getElementById('viewList').classList.add('active');
    document.getElementById('viewGrid').classList.remove('active');
  });

  // Load more
  document.getElementById('btnLoadMore').addEventListener('click', renderBatch);

  // Clear
  document.getElementById('btnClear').addEventListener('click', () => {
    document.querySelectorAll('.sidebar input[type="checkbox"]').forEach(c => c.checked = false);
    document.querySelectorAll('.sidebar input[type="number"]').forEach(i => i.value = '');
    document.querySelectorAll('.sidebar select').forEach(s => s.selectedIndex = 0);
    document.querySelectorAll('.tri-toggle').forEach(tog => {
      tog.querySelectorAll('button').forEach((b, i) => {
        b.classList.toggle('active', i === 0);
      });
      triFilters[tog.dataset.filter] = '';
    });
    document.getElementById('searchBox').value = '';
    applyFilters();
  });

  // Mobile sidebar
  document.getElementById('sidebarToggle').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarClose').style.display = '';
  });
  document.getElementById('sidebarClose').addEventListener('click', () => {
    document.getElementById('sidebar').classList.remove('open');
  });

  applyFilters();
}

function debounce(fn, ms) {
  let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

// Load CSV
fetch('data.csv')
  .then(r => r.text())
  .then(text => {
    const result = Papa.parse(text, { header: true, delimiter: ';', skipEmptyLines: true });
    init(result.data);
  })
  .catch(err => {
    document.getElementById('loading').innerHTML = `<p style="color:var(--red);">Error cargando datos: ${err.message}</p>`;
  });
</script>
</body>
